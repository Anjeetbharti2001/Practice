<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration form</title>
</head>
<body >
    <form align="center" border="1" width="70%" style="color:black">
    <h2>Registration form </h2>

   <h5> <p>Fill in this form to Register</p></h5>
    <table width="100%">
        <level for="lastname">First Name</level>
        <input type="text" id="textholder"  placeholder="enter first name">
        <br>
        <level for="fistname">Last Name</level>
        <input type="text" id="textholder"  placeholder="enter last name">
        <br>
        <level for="email">Email-id</level>
        <input type="text" id="textholder" placeholder="Email-id">
        <br>
        <level for="Date Of Birth">Date of Birth</level>
        <input type="text" id="date of birth" placeholder="dd / mm / yy " >
        <br>
        <level for="set username">Set Username</level>
        <input type="text" placeholder="Set Username">
        <br>
        <level for="set password">set password</level>
        <input type="Set Password" placeholder="Set Password">
        <br>
        <level for="check box">Gender</level><br>
        <input type="radio"> Male
        <input type="radio"> Female
        <input type="radio"> other
        <br>
        <select area-level="select" class="form-select">
            <option selected="course">Course Select</option>
            <option value="1">physics</option>
             <option value="3">chemistry</option>
              <option value="4">math</option>
               <option value="5">Biology(optional)</option>
        </select>
        <button>Submit</button>
    </table>
    </form>
</body>
</html>
